services:
  - type: web
    name: cardforge-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PROVIDER
        value: stripe
      - key: DB_PATH
        value: ./data/cards.db
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: BASIC_AUTH_USER
        sync: false
      - key: BASIC_AUTH_PASS
        sync: false
